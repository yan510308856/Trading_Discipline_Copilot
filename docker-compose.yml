services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:////data/trading_discipline.db
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - trading_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  trading_data:
