services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:////data/trading_discipline.db
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      EMAIL_NOTIFICATIONS_ENABLED: ${EMAIL_NOTIFICATIONS_ENABLED:-false}
      ALERT_RECIPIENT_EMAIL: ${ALERT_RECIPIENT_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      PRICE_ALERT_MONITOR_ENABLED: ${PRICE_ALERT_MONITOR_ENABLED:-false}
      PRICE_ALERT_POLL_SECONDS: ${PRICE_ALERT_POLL_SECONDS:-60}
      PRICE_ALERT_RETRY_LIMIT: ${PRICE_ALERT_RETRY_LIMIT:-3}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - trading_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  trading_data:
