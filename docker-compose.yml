services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:////data/trading_discipline.db
    ports:
      - "8000:8000"
    volumes:
      - trading_data:/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  trading_data:
